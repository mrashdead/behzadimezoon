<div
  class="modal fade"
  id="deleteDressModal{{ dress.id }}"
  tabindex="-1"
  aria-labelledby="deleteDressModalLabel{{ dress.id }}"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header">
        <h5 class="modal-title" id="deleteDressModalLabel{{ dress.id }}">
          حذف محصول
        </h5>
        <button
          type="button"
          class="btn-close m-0"
          data-bs-dismiss="modal"
          aria-label="بستن"
        ></button>
      </div>

      <div class="modal-body">
        <p class="mb-2">آیا از حذف این محصول مطمئن هستید؟</p>
        <div class="p-3 rounded bg-light">
          <div class="small text-muted mb-1">کد لباس</div>
          <div class="fw-semibold">{{ dress.code }}</div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">
          انصراف
        </button>

        <form method="post" action="{% url 'products:delete' dress.pk %}">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">
            بله، حذف شود
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
