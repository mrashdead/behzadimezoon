<div class="modal fade" id="deleteCustomerModal{{ customer.id }}" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form method="post" action="{% url 'customers:delete' customer.id %}" class="no-ajax">
                {% csrf_token %}

                {% include 'partials/_modal_header.html' with title='حذف مشتری' %}

                <div class="modal-body">
                    <div class="d-flex align-items-start gap-3">
                        <div class="avatar rounded-circle bg-danger-subtle text-danger flex-shrink-0" style="width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;">
                            <i class="fi fi-rr-trash"></i>
                        </div>
                        <div class="flex-grow-1">
                            <h6 class="mb-2 text-danger">آیا از حذف این مشتری مطمئن هستید؟</h6>
                            <p class="mb-1">
                                مشتری:
                                <strong>{{ customer.bride_first_name }} {{ customer.bride_last_name }}</strong>
                            </p>
                            <p class="mb-0 text-muted small">
                                این مورد به‌صورت دائمی حذف می‌شود و قابل بازیابی نخواهد بود.
                            </p>
                        </div>
                    </div>
                </div>

                <div class="modal-footer border-top">
                    <button type="button" class="btn btn-light waves-effect" data-bs-dismiss="modal">انصراف</button>
                    <button type="submit" class="btn btn-danger waves-effect waves-light">
                        <i class="fi fi-rr-trash me-1"></i>
                        حذف مشتری
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
