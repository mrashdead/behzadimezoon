{% load jalali_tags %}
{% load jformat %}

<div class="modal fade" id="createCustomerModal" tabindex="-1" aria-labelledby="createCustomerModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <form method="post" action="{% url 'customers:create' %}" class="h-100 d-flex flex-column no-ajax">
        {% csrf_token %}

        {% include 'partials/_modal_header.html' with title='افزودن مشتری جدید' %}

        <div class="modal-body">
          <div class="row g-3">
            <!-- بخش اطلاعات عروس -->
            <div class="col-12">
              <div class="card shadow-none border">
                <div class="card-header bg-body-tertiary border-bottom py-3">
                  <h6 class="mb-0 fw-semibold">
                    <i class="fi fi-rr-user me-2"></i>
                    اطلاعات عروس
                  </h6>
                </div>
                <div class="card-body">
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label for="id_bride_first_name" class="form-label">نام عروس</label>
                      <input type="text" name="bride_first_name" id="id_bride_first_name" class="form-control" required />
                    </div>
                    <div class="col-md-6">
                      <label for="id_bride_last_name" class="form-label">نام خانوادگی عروس</label>
                      <input type="text" name="bride_last_name" id="id_bride_last_name" class="form-control" required />
                    </div>
                    <div class="col-md-6">
                      <label for="id_bride_phone" class="form-label">شماره تماس عروس</label>
                      <input
                        type="text"
                        name="bride_phone"
                        id="id_bride_phone"
                        class="form-control"
                        required
                        maxlength="11"
                        inputmode="numeric"
                        pattern="\d{11}"
                        placeholder="مثال: 09121234567"
                      />
                    </div>
                    <div class="col-md-6">
                      <label for="id_ceremony_date" class="form-label">تاریخ مراسم</label>
                      <input type="text" id="id_ceremony_date" name="ceremony_date" class="form-control p-date-only" required />
                    </div>
                    <div class="col-md-6">
                      <label for="id_how_to_know" class="form-label">نحوه آشنایی</label>
                      <select name="how_to_know" id="id_how_to_know" class="form-select" required>
                        <option value="">انتخاب کنید</option>
                        <option value="اینستاگرام">اینستاگرام</option>
                        <option value="معرفی دوستان یا آشنایان">معرفی دوستان یا آشنایان</option>
                        <option value="جستجو اینترنتی">جستجو اینترنتی</option>
                        <option value="تبلیغات">تبلیغات</option>
                        <option value="سالن زیبایی">سالن زیبایی</option>
                        <option value="تشریفات عروس">تشریفات عروس</option>
                        <option value="گروه موسیقی">گروه موسیقی</option>
                        <option value="سایر">سایر</option>
                      </select>
                    </div>
                    <div class="col-md-6" id="how_to_know_detail_group">
                      <label for="id_how_to_know_detail" class="form-label">توضیحات تکمیلی</label>
                      <input type="text" name="how_to_know_detail" id="id_how_to_know_detail" class="form-control" placeholder="توضیح یا نام سالن/سایر" />
                    </div>
                    <div class="col-md-6">
                      <label for="id_city" class="form-label">شهر</label>
                      <input type="text" name="city" id="id_city" class="form-control" placeholder="نام شهر" />
                    </div>
                    <div class="col-md-6 d-flex align-items-end">
                      <div class="form-check w-100 mt-md-2">
                        <input type="checkbox" name="allow_contact" id="id_allow_contact" class="form-check-input" />
                        <label class="form-check-label" for="id_allow_contact">اجازه ارتباط با مشتری</label>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- بخش اطلاعات داماد -->
            <div class="col-12">
              <div class="card shadow-none border">
                <div class="card-header bg-body-tertiary border-bottom py-3">
                  <h6 class="mb-0 fw-semibold">
                    <i class="fi fi-rr-user me-2"></i>
                    اطلاعات داماد
                  </h6>
                </div>
                <div class="card-body">
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label for="id_groom_first_name" class="form-label">نام داماد</label>
                      <input type="text" name="groom_first_name" id="id_groom_first_name" class="form-control" />
                    </div>
                    <div class="col-md-6">
                      <label for="id_groom_last_name" class="form-label">نام خانوادگی داماد</label>
                      <input type="text" name="groom_last_name" id="id_groom_last_name" class="form-control" />
                    </div>
                    <div class="col-md-6">
                      <label for="id_groom_phone" class="form-label">شماره تماس داماد</label>
                      <input type="text" name="groom_phone" id="id_groom_phone" class="form-control" />
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- بخش خدمات و مراسم -->
            <div class="col-12">
              <div class="card shadow-none border">
                <div class="card-header bg-body-tertiary border-bottom py-3">
                  <h6 class="mb-0 fw-semibold">
                    <i class="fi fi-rr-list-check me-2"></i>
                    خدمات و مراسم
                  </h6>
                </div>
                <div class="card-body">
                  <div class="row g-3">
                    <div class="col-12">
                      <label class="form-label">خدمات مورد نظر</label>
                      <div class="border rounded p-3">
                        <div class="row g-2">
                          <div class="col-md-6">
                            <div class="form-check">
                              <input class="form-check-input" type="checkbox" name="requested_services" id="id_requested_services_1" value="اجاره لباس">
                              <label class="form-check-label" for="id_requested_services_1">اجاره لباس</label>
                            </div>
                          </div>
                          <div class="col-md-6">
                            <div class="form-check">
                              <input class="form-check-input" type="checkbox" name="requested_services" id="id_requested_services_2" value="خرید لباس">
                              <label class="form-check-label" for="id_requested_services_2">خرید لباس</label>
                            </div>
                          </div>
                          <div class="col-md-6">
                            <div class="form-check">
                              <input class="form-check-input" type="checkbox" name="requested_services" id="id_requested_services_3" value="دوخت اختصاصی">
                              <label class="form-check-label" for="id_requested_services_3">دوخت اختصاصی</label>
                            </div>
                          </div>
                          <div class="col-md-6">
                            <div class="form-check">
                              <input class="form-check-input" type="checkbox" name="requested_services" id="id_requested_services_4" value="جزئیات تکمیلی (اکسسوری)">
                              <label class="form-check-label" for="id_requested_services_4">جزئیات تکمیلی (اکسسوری)</label>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <label for="id_preferred_consultant" class="form-label">مشاور ترجیحی</label>
                      <select name="preferred_consultant" id="id_preferred_consultant" class="form-select">
                        <option value="">انتخاب کنید</option>
                        <option value="مشاوره تخصصی لباس">مشاوره تخصصی لباس</option>
                        <option value="مشاور زیبایی">مشاور زیبایی</option>
                        <option value="مشاوره کامل">مشاوره کامل</option>
                      </select>
                    </div>
                    <div class="col-md-6">
                      <label for="id_estimated_budget" class="form-label">بودجه تقریبی</label>
                      <select name="estimated_budget" id="id_estimated_budget" class="form-select">
                        <option value="">انتخاب کنید</option>
                        <option value="اقتصادی">اقتصادی</option>
                        <option value="متوسط">متوسط</option>
                        <option value="پرمیوم">پرمیوم</option>
                        <option value="ویژه">ویژه</option>
                      </select>
                    </div>
                    <div class="col-12">
                      <label class="form-label">خدمات جانبی</label>
                      <div class="border rounded p-3">
                        <div class="row g-2">
                          <div class="col-md-6">
                            <div class="form-check">
                              <input class="form-check-input" type="checkbox" name="additional_services" id="id_additional_services_1" value="آتلیه">
                              <label class="form-check-label" for="id_additional_services_1">آتلیه</label>
                            </div>
                          </div>
                          <div class="col-md-6">
                            <div class="form-check">
                              <input class="form-check-input" type="checkbox" name="additional_services" id="id_additional_services_2" value="تشریفات">
                              <label class="form-check-label" for="id_additional_services_2">تشریفات</label>
                            </div>
                          </div>
                          <div class="col-md-6">
                            <div class="form-check">
                              <input class="form-check-input" type="checkbox" name="additional_services" id="id_additional_services_3" value="گروه موسیقی">
                              <label class="form-check-label" for="id_additional_services_3">گروه موسیقی</label>
                            </div>
                          </div>
                          <div class="col-md-6">
                            <div class="form-check">
                              <input class="form-check-input" type="checkbox" name="additional_services" id="id_additional_services_4" value="سالن زیبایی">
                              <label class="form-check-label" for="id_additional_services_4">سالن زیبایی</label>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <label for="id_guest_count" class="form-label">تعداد مهمان</label>
                      <input type="number" name="guest_count" id="id_guest_count" class="form-control" />
                    </div>
                    <div class="col-md-6">
                      <label for="id_ceremony_decoration" class="form-label">تشریفات</label>
                      <input type="text" name="ceremony_decoration" id="id_ceremony_decoration" class="form-control" />
                    </div>
                    <div class="col-md-6">
                      <label for="id_beauty_salon" class="form-label">سالن زیبایی</label>
                      <input type="text" name="beauty_salon" id="id_beauty_salon" class="form-control" />
                    </div>
                    <div class="col-md-6">
                      <label for="id_studio_name" class="form-label">آتلیه</label>
                      <input type="text" name="studio_name" id="id_studio_name" class="form-control" />
                    </div>
                    <div class="col-md-6">
                      <label for="id_music_band" class="form-label">گروه موسیقی</label>
                      <input type="text" name="music_band" id="id_music_band" class="form-control" />
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- بخش توضیحات تکمیلی -->
            <div class="col-12">
              <div class="card shadow-none border">
                <div class="card-header bg-body-tertiary border-bottom py-3">
                  <h6 class="mb-0 fw-semibold">
                    <i class="fi fi-rr-document me-2"></i>
                    توضیحات تکمیلی
                  </h6>
                </div>
                <div class="card-body">
                  <label for="id_customer_note" class="form-label">یادداشت مشتری</label>
                  <textarea name="customer_note" id="id_customer_note" class="form-control" rows="4" placeholder="توضیحات و یادداشت‌های مرتبط با مشتری..."></textarea>
                </div>
              </div>
            </div>
          </div>
        </div>

        {% include 'partials/_modal_footer.html' with cancel_text='انصراف' submit_text='ثبت مشتری' %}
      </form>
    </div>
  </div>
</div>
