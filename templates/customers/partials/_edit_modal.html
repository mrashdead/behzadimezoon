{% load jalali_tags %}
{% load jformat %}

<div class="modal fade" id="editCustomerModal{{ customer.id }}" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <form method="post" action="{% url 'customers:update' customer.id %}" class="h-100 d-flex flex-column no-ajax">
        {% csrf_token %}

        {% include 'partials/_modal_header.html' with title='ویرایش مشتری' %}

        <div class="modal-body">
          <div class="row g-3">
            <!-- بخش اطلاعات عروس -->
            <div class="col-12">
              <div class="card shadow-none border">
                <div class="card-header bg-body-tertiary border-bottom py-3">
                  <h6 class="mb-0 fw-semibold">
                    <i class="fi fi-rr-user me-2"></i>
                    اطلاعات عروس
                  </h6>
                </div>
                <div class="card-body">
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label for="id_bride_first_name_{{ customer.id }}" class="form-label">نام عروس</label>
                      <input type="text" name="bride_first_name" id="id_bride_first_name_{{ customer.id }}" class="form-control" value="{{ customer.bride_first_name|default:'' }}" required />
                    </div>
                    <div class="col-md-6">
                      <label for="id_bride_last_name_{{ customer.id }}" class="form-label">نام خانوادگی عروس</label>
                      <input type="text" name="bride_last_name" id="id_bride_last_name_{{ customer.id }}" class="form-control" value="{{ customer.bride_last_name|default:'' }}" required />
                    </div>
                    <div class="col-md-6">
                      <label for="id_bride_phone_{{ customer.id }}" class="form-label">شماره تماس عروس</label>
                      <input
                        type="text"
                        name="bride_phone"
                        id="id_bride_phone_{{ customer.id }}"
                        class="form-control"
                        value="{{ customer.bride_phone|default:'' }}"
                        required
                        maxlength="11"
                        inputmode="numeric"
                        pattern="\d{11}"
                        placeholder="مثال: 09121234567"
                      />
                    </div>
                    <div class="col-md-6">
                      <label for="id_ceremony_date_{{ customer.id }}" class="form-label">تاریخ مراسم</label>
                      <input type="text" id="id_ceremony_date_{{ customer.id }}" name="ceremony_date" class="form-control p-date-only" value="{{ customer.ceremony_date|jformat:'%Y/%m/%d'|default:'' }}" required />
                    </div>
                    <div class="col-md-6">
                      <label for="id_how_to_know_{{ customer.id }}" class="form-label">نحوه آشنایی</label>
                      <select name="how_to_know" id="id_how_to_know_{{ customer.id }}" class="form-select" required>
                        <option value="">انتخاب کنید</option>
                        <option value="اینستاگرام" {% if customer.how_to_know == 'اینستاگرام' %}selected{% endif %}>اینستاگرام</option>
                        <option value="معرفی دوستان یا آشنایان" {% if customer.how_to_know == 'معرفی دوستان یا آشنایان' %}selected{% endif %}>معرفی دوستان یا آشنایان</option>
                        <option value="جستجو اینترنتی" {% if customer.how_to_know == 'جستجو اینترنتی' %}selected{% endif %}>جستجو اینترنتی</option>
                        <option value="تبلیغات" {% if customer.how_to_know == 'تبلیغات' %}selected{% endif %}>تبلیغات</option>
                        <option value="سالن زیبایی" {% if customer.how_to_know_option == 'سالن زیبایی' %}selected{% endif %}>سالن زیبایی</option>
                        <option value="تشریفات عروس" {% if customer.how_to_know_option == 'تشریفات عروس' %}selected{% endif %}>تشریفات عروس</option>
                        <option value="گروه موسیقی" {% if customer.how_to_know_option == 'گروه موسیقی' %}selected{% endif %}>گروه موسیقی</option>
                        <option value="سایر" {% if customer.how_to_know_option == 'سایر' %}selected{% endif %}>سایر</option>
                        <option value="ندارد" {% if customer.how_to_know == 'ندارد' %}selected{% endif %}>ندارد</option>
                      </select>
                    </div>
                    <div class="col-md-6" id="how_to_know_detail_group_{{ customer.id }}">
                      <label for="id_how_to_know_detail_{{ customer.id }}" class="form-label">توضیحات تکمیلی</label>
                      <input type="text" name="how_to_know_detail" id="id_how_to_know_detail_{{ customer.id }}" class="form-control" value="{{ customer.how_to_know_detail|default:'' }}" placeholder="توضیح یا نام سالن/سایر" />
                    </div>
                    <div class="col-md-6">
                      <label for="id_city_{{ customer.id }}" class="form-label">شهر</label>
                      <input type="text" name="city" id="id_city_{{ customer.id }}" class="form-control" value="{{ customer.city|default:'' }}" placeholder="نام شهر" />
                    </div>
                    <div class="col-md-6 d-flex align-items-end">
                      <div class="form-check w-100 mt-md-2">
                        <input type="checkbox" name="allow_contact" id="id_allow_contact_{{ customer.id }}" class="form-check-input" {% if customer.allow_contact %}checked{% endif %} />
                        <label class="form-check-label" for="id_allow_contact_{{ customer.id }}">اجازه ارتباط با مشتری</label>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- بخش اطلاعات داماد -->
            <div class="col-12">
              <div class="card shadow-none border">
                <div class="card-header bg-body-tertiary border-bottom py-3">
                  <h6 class="mb-0 fw-semibold">
                    <i class="fi fi-rr-user me-2"></i>
                    اطلاعات داماد
                  </h6>
                </div>
                <div class="card-body">
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label for="id_groom_first_name_{{ customer.id }}" class="form-label">نام داماد</label>
                      <input type="text" name="groom_first_name" id="id_groom_first_name_{{ customer.id }}" class="form-control" value="{{ customer.groom_first_name|default:'' }}" />
                    </div>
                    <div class="col-md-6">
                      <label for="id_groom_last_name_{{ customer.id }}" class="form-label">نام خانوادگی داماد</label>
                      <input type="text" name="groom_last_name" id="id_groom_last_name_{{ customer.id }}" class="form-control" value="{{ customer.groom_last_name|default:'' }}" />
                    </div>
                    <div class="col-md-6">
                      <label for="id_groom_phone_{{ customer.id }}" class="form-label">شماره تماس داماد</label>
                      <input type="text" name="groom_phone" id="id_groom_phone_{{ customer.id }}" class="form-control" value="{{ customer.groom_phone|default:'' }}" maxlength="11" inputmode="numeric" pattern="\d{11}" placeholder="مثال: 09121234567" />
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- بخش خدمات و مراسم -->
            <div class="col-12">
              <div class="card shadow-none border">
                <div class="card-header bg-body-tertiary border-bottom py-3">
                  <h6 class="mb-0 fw-semibold">
                    <i class="fi fi-rr-list-check me-2"></i>
                    خدمات و مراسم
                  </h6>
                </div>
                <div class="card-body">
                  <div class="row g-3">
                    <div class="col-12">
                      <label class="form-label">خدمات مورد نظر</label>
                      <div class="border rounded p-3">
                        <div class="row g-2">
                          <div class="col-md-6">
                            <div class="form-check">
                              <input class="form-check-input" type="checkbox" name="requested_services" id="id_requested_services_1_{{ customer.id }}" value="اجاره لباس" {% if 'اجاره لباس' in customer.requested_services %}checked{% endif %}>
                              <label class="form-check-label" for="id_requested_services_1_{{ customer.id }}">اجاره لباس</label>
                            </div>
                          </div>
                          <div class="col-md-6">
                            <div class="form-check">
                              <input class="form-check-input" type="checkbox" name="requested_services" id="id_requested_services_2_{{ customer.id }}" value="خرید لباس" {% if 'خرید لباس' in customer.requested_services %}checked{% endif %}>
                              <label class="form-check-label" for="id_requested_services_2_{{ customer.id }}">خرید لباس</label>
                            </div>
                          </div>
                          <div class="col-md-6">
                            <div class="form-check">
                              <input class="form-check-input" type="checkbox" name="requested_services" id="id_requested_services_3_{{ customer.id }}" value="دوخت اختصاصی" {% if 'دوخت اختصاصی' in customer.requested_services %}checked{% endif %}>
                              <label class="form-check-label" for="id_requested_services_3_{{ customer.id }}">دوخت اختصاصی</label>
                            </div>
                          </div>
                          <div class="col-md-6">
                            <div class="form-check">
                              <input class="form-check-input" type="checkbox" name="requested_services" id="id_requested_services_4_{{ customer.id }}" value="جزئیات تکمیلی (اکسسوری)" {% if 'جزئیات تکمیلی (اکسسوری)' in customer.requested_services %}checked{% endif %}>
                              <label class="form-check-label" for="id_requested_services_4_{{ customer.id }}">جزئیات تکمیلی (اکسسوری)</label>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <label for="id_preferred_consultant_{{ customer.id }}" class="form-label">نوع مشاوره مورد نیاز</label>
                      <select name="preferred_consultant" id="id_preferred_consultant_{{ customer.id }}" class="form-select">
                        <option value="">انتخاب کنید</option>
                        <option value="مشاوره تخصصی لباس" {% if customer.preferred_consultant == 'مشاوره تخصصی لباس' %}selected{% endif %}>مشاوره تخصصی لباس</option>
                        <option value="مشاور زیبایی" {% if customer.preferred_consultant == 'مشاور زیبایی' %}selected{% endif %}>مشاور زیبایی</option>
                        <option value="مشاوره کامل" {% if customer.preferred_consultant == 'مشاوره کامل' %}selected{% endif %}>مشاوره کامل</option>
                      </select>
                    </div>
                    <div class="col-md-6">
                      <label for="id_preferred_consultant_name_{{ customer.id }}" class="form-label">نام مشاور</label>
                      <input type="text" name="preferred_consultant_name" id="id_preferred_consultant_name_{{ customer.id }}" class="form-control" value="{{ customer.preferred_consultant_name|default:'' }}" placeholder="نام مشاور" />
                    </div>
                    <div class="col-md-6">
                      <label for="id_estimated_budget_{{ customer.id }}" class="form-label">بودجه تقریبی</label>
                      <select name="estimated_budget" id="id_estimated_budget_{{ customer.id }}" class="form-select">
                        <option value="">انتخاب کنید</option>
                        <option value="اقتصادی" {% if customer.estimated_budget == 'اقتصادی' %}selected{% endif %}>اقتصادی</option>
                        <option value="متوسط" {% if customer.estimated_budget == 'متوسط' %}selected{% endif %}>متوسط</option>
                        <option value="پرمیوم" {% if customer.estimated_budget == 'پرمیوم' %}selected{% endif %}>پرمیوم</option>
                        <option value="ویژه" {% if customer.estimated_budget == 'ویژه' %}selected{% endif %}>ویژه</option>
                      </select>
                    </div>
                    <div class="col-12">
                      <label class="form-label">خدمات جانبی</label>
                      <div class="border rounded p-3">
                        <div class="row g-2">
                          <div class="col-md-6">
                            <div class="form-check">
                              <input class="form-check-input" type="checkbox" name="additional_services" id="id_additional_services_1_{{ customer.id }}" value="آتلیه" {% if 'آتلیه' in customer.additional_services %}checked{% endif %}>
                              <label class="form-check-label" for="id_additional_services_1_{{ customer.id }}">آتلیه</label>
                            </div>
                          </div>
                          <div class="col-md-6">
                            <div class="form-check">
                              <input class="form-check-input" type="checkbox" name="additional_services" id="id_additional_services_2_{{ customer.id }}" value="تشریفات" {% if 'تشریفات' in customer.additional_services %}checked{% endif %}>
                              <label class="form-check-label" for="id_additional_services_2_{{ customer.id }}">تشریفات</label>
                            </div>
                          </div>
                          <div class="col-md-6">
                            <div class="form-check">
                              <input class="form-check-input" type="checkbox" name="additional_services" id="id_additional_services_3_{{ customer.id }}" value="گروه موسیقی" {% if 'گروه موسیقی' in customer.additional_services %}checked{% endif %}>
                              <label class="form-check-label" for="id_additional_services_3_{{ customer.id }}">گروه موسیقی</label>
                            </div>
                          </div>
                          <div class="col-md-6">
                            <div class="form-check">
                              <input class="form-check-input" type="checkbox" name="additional_services" id="id_additional_services_4_{{ customer.id }}" value="سالن زیبایی" {% if 'سالن زیبایی' in customer.additional_services %}checked{% endif %}>
                              <label class="form-check-label" for="id_additional_services_4_{{ customer.id }}">سالن زیبایی</label>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <label for="id_guest_count_{{ customer.id }}" class="form-label">تعداد مهمان</label>
                      <input type="number" name="guest_count" id="id_guest_count_{{ customer.id }}" class="form-control" value="{{ customer.guest_count|default:'' }}" />
                    </div>
                    <div class="col-md-6">
                      <label for="id_ceremony_decoration_{{ customer.id }}" class="form-label">تشریفات</label>
                      <input type="text" name="ceremony_decoration" id="id_ceremony_decoration_{{ customer.id }}" class="form-control" value="{{ customer.ceremony_decoration|default:'' }}" />
                    </div>
                    <div class="col-md-6">
                      <label for="id_beauty_salon_{{ customer.id }}" class="form-label">سالن زیبایی</label>
                      <input type="text" name="beauty_salon" id="id_beauty_salon_{{ customer.id }}" class="form-control" value="{{ customer.beauty_salon|default:'' }}" />
                    </div>
                    <div class="col-md-6">
                      <label for="id_studio_name_{{ customer.id }}" class="form-label">آتلیه</label>
                      <input type="text" name="studio_name" id="id_studio_name_{{ customer.id }}" class="form-control" value="{{ customer.studio_name|default:'' }}" />
                    </div>
                    <div class="col-md-6">
                      <label for="id_music_band_{{ customer.id }}" class="form-label">گروه موسیقی</label>
                      <input type="text" name="music_band" id="id_music_band_{{ customer.id }}" class="form-control" value="{{ customer.music_band|default:'' }}" />
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- بخش توضیحات تکمیلی -->
            <div class="col-12">
              <div class="card shadow-none border">
                <div class="card-header bg-body-tertiary border-bottom py-3">
                  <h6 class="mb-0 fw-semibold">
                    <i class="fi fi-rr-document me-2"></i>
                    توضیحات تکمیلی
                  </h6>
                </div>
                <div class="card-body">
                  <label for="id_customer_note_{{ customer.id }}" class="form-label">یادداشت مشتری</label>
                  <textarea name="customer_note" id="id_customer_note_{{ customer.id }}" class="form-control" rows="4" placeholder="توضیحات و یادداشت‌های مرتبط با مشتری...">{{ customer.customer_note|default:'' }}</textarea>
                </div>
              </div>
            </div>
          </div>
        </div>

        {% include 'partials/_modal_footer.html' with cancel_text='انصراف' submit_text='ذخیره تغییرات' %}
      </form>
    </div>
  </div>
</div>
