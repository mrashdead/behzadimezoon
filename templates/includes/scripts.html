    staticUrl: "{% get_static_prefix %}",
    searchJsonUrl: "{% static 'assets/ajax/search.json' %}",
  };

<script>
  $(document).ready(function () {
    $(".jalali-datepicker").persianDatepicker({
      format: "YYYY/MM/DD",
      autoClose: true,
      initialValue: false,
      onlySelectOnDate: true,
      observer: true,
      calendar: {
        persian: {
          locale: "fa",
        },
      },
    });
  });
</script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  const inputs = document.querySelectorAll('.jalali-mask');

  inputs.forEach(function (input) {
    input.addEventListener('input', function () {
      let value = this.value.replace(/\D/g, '').slice(0, 8);

      if (value.length > 6) {
        value = value.slice(0, 4) + '/' + value.slice(4, 6) + '/' + value.slice(6);
      } else if (value.length > 4) {
        value = value.slice(0, 4) + '/' + value.slice(4);
      }

      this.value = value;
    });
  });
});
</script>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.js-price').forEach(function (element) {
      const rawPrice = element.dataset.price;
      const number = Number(rawPrice);
      if (!Number.isNaN(number)) {
        element.textContent = number.toLocaleString('en-US');
      } else {
        element.textContent = rawPrice;
      }
    });
  });
</script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.js-jalali-datetime').forEach(function (element) {
      const rawValue = element.dataset.datetime;
      const date = new Date(rawValue);

      if (Number.isNaN(date.getTime())) {
        element.textContent = rawValue;
        return;
      }

      const datePart = new Intl.DateTimeFormat('fa-IR-u-ca-persian', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      }).format(date);

      const timePart = new Intl.DateTimeFormat('fa-IR', {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      }).format(date);

      element.innerHTML = `
        <div class="d-flex flex-column">
          <span class="fw-semibold">${datePart}</span>
          <small class="text-muted">${timePart}</small>
        </div>
      `;
    });
  });
</script>

<script>

document.addEventListener("DOMContentLoaded", function () {

let step1 = document.getElementById("reservationStep1")
let step2 = document.getElementById("reservationStep2")

let nextBtn = document.getElementById("nextStepButton")
let submitBtn = document.getElementById("createReservationButton")

let form = document.getElementById("reservationCreateForm")

if(!form) return


let customerSelect = form.querySelector("select[name='customer']")
let dressSelect = form.querySelector("select[name='dress']")
let startDateInput = form.querySelector("input[name='start_date']")
let rentalDaysInput = form.querySelector("input[name='rental_days']")

let eventDateField = document.getElementById("event_date")
let endDateField = document.getElementById("end_date")
let rentPriceField = document.getElementById("rent_price")
let remainingAmountField = document.getElementById("remaining_amount")

let depositInput = form.querySelector("input[name='deposit_amount']")
let discountInput = form.querySelector("input[name='discount_amount']")

let rentPrice = 0



function checkAvailability() {

let dress = dressSelect.value
let customer = customerSelect.value
let start_date = startDateInput.value
let rental_days = rentalDaysInput.value

if(!dress || !customer || !start_date || !rental_days){
  return
}

fetch("/reservations/check-availability/", {

method: "POST",

headers: {
"Content-Type": "application/x-www-form-urlencoded",
"X-CSRFToken": getCookie("csrftoken")
},

body: new URLSearchParams({
  customer_id: customer,
  dress_id: dress,
  start_date: start_date,
  rental_days: rental_days
})

})
.then(response => response.json())
.then(data => {

if(data.success){

if(data.available){

      endDateField.value = data.end_date
      eventDateField.value = data.event_date
      rentPrice = parseFloat(data.rent_price) || 0
      rentPriceField.value = formatCurrency(rentPrice)
      if (remainingAmountField) {
        remainingAmountField.value = formatCurrency(rentPrice)
      }

      nextBtn.disabled = false

    } else {

nextBtn.disabled = true

}

}else{

alert(data.message)

}

})

}



function saveReservationStepOne() {
  let formData = new URLSearchParams({
    customer: customerSelect.value,
    dress: dressSelect.value,
    start_date: startDateInput.value,
    rental_days: rentalDaysInput.value
  })

  return fetch("/reservations/step-one/", {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded",
      "X-CSRFToken": getCookie("csrftoken")
    },
    body: formData
  }).then(response => response.json())
}

dressSelect.addEventListener("change", checkAvailability)
startDateInput.addEventListener("change", checkAvailability)
rentalDaysInput.addEventListener("input", checkAvailability)



nextBtn.addEventListener("click", function(){
  saveReservationStepOne().then(data => {
    if (data.success) {
      step1.style.display = "none"
      step2.style.display = "block"

      nextBtn.style.display = "none"
      submitBtn.classList.remove('d-none')
      submitBtn.style.display = "inline-block"
      submitBtn.disabled = false
    } else {
      let message = data.message || ''
      if (data.errors) {
        message = Object.values(data.errors).flat().join('\n')
      }
      alert(message || 'مرحله اول به درستی ثبت نشد.')
    }
  }).catch(() => {
    alert('خطا در ذخیره اطلاعات مرحله اول. لطفا دوباره تلاش کنید.')
  })
})



function formatCurrency(value) {
  if (Number.isNaN(value) || value === null) {
    return ''
  }
  return Number(Math.round(value)).toLocaleString('en-US')
}

function calculateRemaining(){
  let deposit = parseFloat(depositInput.value || 0)
  let discount = parseFloat(discountInput.value || 0)

  let remaining = rentPrice - deposit - discount

  if(remaining < 0){
    remaining = 0
  }

  if (remainingAmountField) {
    remainingAmountField.value = formatCurrency(remaining)
  }
}



depositInput.addEventListener("input", calculateRemaining)
discountInput.addEventListener("input", calculateRemaining)



form.addEventListener("submit", function(e){

  e.preventDefault()

  let formData = new FormData(form)

  fetch("/reservations/create/", {

    method: "POST",

    headers:{
      "X-CSRFToken": getCookie("csrftoken")
    },

    body: formData

  })
  .then(res => res.json())
  .then(data => {

    if(data.success){
      location.reload()
      return
    }

    let message = data.message || ''
    if (data.errors) {
      message = Object.values(data.errors).flat().join('\n')
    }
    alert(message || "خطا در ثبت رزرو")

  })

})



function getCookie(name) {

let cookieValue = null

if (document.cookie && document.cookie !== '') {

let cookies = document.cookie.split(';')

for (let i = 0; i < cookies.length; i++) {

let cookie = cookies[i].trim()

if (cookie.substring(0, name.length + 1) === (name + '=')) {

cookieValue = decodeURIComponent(cookie.substring(name.length + 1))

break

}

}

}

return cookieValue

}

})

</script>
