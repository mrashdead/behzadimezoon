{% load static %}
<script src="{% static 'assets/libs/global/global.min.js' %}"></script>
<script src="{% static 'assets/libs/sortable/Sortable.min.js' %}"></script>
<script src="{% static 'assets/libs/chartjs/chart.js' %}"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://unpkg.com/persian-date@1.1.0/dist/persian-date.min.js"></script>
<script src="https://unpkg.com/persian-datepicker@1.2.0/dist/js/persian-datepicker.min.js"></script>
<script src="{% static 'assets/libs/apexcharts/apexcharts.min.js' %}"></script>
<script src="{% static 'assets/libs/datatables/datatables.min.js' %}"></script>
<script src="{% static 'assets/js/appSettings.js' %}"></script>
<script>
  window.APP_CONFIG = {
    staticUrl: "{% get_static_prefix %}",
    searchJsonUrl: "{% static 'assets/ajax/search.json' %}",
  };
</script>
<script src="{% static 'assets/js/main.js' %}"></script>
<script src="{% static 'assets/libs/persian-datepicker/persian-datepicker.js' %}"></script>
<script src="{% static 'assets/libs/persian-datepicker/persian-datepicker.min.js' %}"></script>

<script>
  $(document).ready(function () {
    $(".jalali-datepicker").persianDatepicker({
      format: "YYYY/MM/DD",
      autoClose: true,
      initialValue: false,
      onlySelectOnDate: true,
      observer: true,
      calendar: {
        persian: {
          locale: "fa",
        },
      },
    });
  });
</script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  const inputs = document.querySelectorAll('.jalali-mask');

  inputs.forEach(function (input) {
    input.addEventListener('input', function () {
      let value = this.value.replace(/\D/g, '').slice(0, 8);

      if (value.length > 6) {
        value = value.slice(0, 4) + '/' + value.slice(4, 6) + '/' + value.slice(6);
      } else if (value.length > 4) {
        value = value.slice(0, 4) + '/' + value.slice(4);
      }

      this.value = value;
    });
  });
});
</script>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.js-price').forEach(function (element) {
      const rawPrice = element.dataset.price;
      const number = Number(rawPrice);
      if (!Number.isNaN(number)) {
        element.textContent = number.toLocaleString('en-US');
      } else {
        element.textContent = rawPrice;
      }
    });
  });
</script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.js-jalali-datetime').forEach(function (element) {
      const rawValue = element.dataset.datetime;
      const date = new Date(rawValue);

      if (Number.isNaN(date.getTime())) {
        element.textContent = rawValue;
        return;
      }

      const datePart = new Intl.DateTimeFormat('fa-IR-u-ca-persian', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      }).format(date);

      const timePart = new Intl.DateTimeFormat('fa-IR', {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      }).format(date);

      element.innerHTML = `
        <div class="d-flex flex-column">
          <span class="fw-semibold">${datePart}</span>
          <small class="text-muted">${timePart}</small>
        </div>
      `;
    });
  });
</script>
