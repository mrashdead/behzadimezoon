    staticUrl: "{% get_static_prefix %}",
    searchJsonUrl: "{% static 'assets/ajax/search.json' %}",
  };

<script src="{% static 'assets/libs/persian-datepicker/persian-datepicker.min.js' %}"></script>

<script>
  $(document).ready(function () {
    $(".jalali-datepicker").persianDatepicker({
      format: "YYYY/MM/DD",
      autoClose: true,
      initialValue: false,
      onlySelectOnDate: true,
      observer: true,
      calendar: {
        persian: {
          locale: "fa",
        },
      },
    });
  });
</script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  const inputs = document.querySelectorAll('.jalali-mask');

  inputs.forEach(function (input) {
    input.addEventListener('input', function () {
      let value = this.value.replace(/\D/g, '').slice(0, 8);

      if (value.length > 6) {
        value = value.slice(0, 4) + '/' + value.slice(4, 6) + '/' + value.slice(6);
      } else if (value.length > 4) {
        value = value.slice(0, 4) + '/' + value.slice(4);
      }

      this.value = value;
    });
  });
});
</script>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.js-price').forEach(function (element) {
      const rawPrice = element.dataset.price;
      const number = Number(rawPrice);
      if (!Number.isNaN(number)) {
        element.textContent = number.toLocaleString('en-US');
      } else {
        element.textContent = rawPrice;
      }
    });
  });
</script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.js-jalali-datetime').forEach(function (element) {
      const rawValue = element.dataset.datetime;
      const date = new Date(rawValue);

      if (Number.isNaN(date.getTime())) {
        element.textContent = rawValue;
        return;
      }

      const datePart = new Intl.DateTimeFormat('fa-IR-u-ca-persian', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      }).format(date);

      const timePart = new Intl.DateTimeFormat('fa-IR', {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      }).format(date);

      element.innerHTML = `
        <div class="d-flex flex-column">
          <span class="fw-semibold">${datePart}</span>
          <small class="text-muted">${timePart}</small>
        </div>
      `;
    });
  });
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const step1 = document.getElementById("reservationStep1")
  const step2 = document.getElementById("reservationStep2")
  const step2Card = document.getElementById("reservationStep2Card")

  const nextBtn = document.getElementById("nextStepButton")
  const submitBtn = document.getElementById("createReservationButton")
  const form = document.getElementById("reservationCreateForm")

  if (!form) return

  const customerSelect = form.querySelector("select[name='customer']")
  const dressSelect = form.querySelector("select[name='dress']")
  const startDateInput = form.querySelector("input[name='start_date']")
  const rentalDaysInput = form.querySelector("input[name='rental_days']")

  const eventDateField = document.getElementById("event_date")
  const endDateField = document.getElementById("end_date")
  const rentPriceField = document.getElementById("rent_price")
  const remainingAmountField = document.getElementById("remaining_amount")

  const depositInput = form.querySelector("input[name='deposit_amount']")
  const discountInput = form.querySelector("input[name='discount_amount']")

  let rentPrice = 0


  function getCookie(name) {
    let cookieValue = null
    if (document.cookie && document.cookie !== "") {
      const cookies = document.cookie.split(";")
      for (let i = 0; i < cookies.length; i++) {
        const cookie = cookies[i].trim()
        if (cookie.substring(0, name.length + 1) === name + "=") {
          cookieValue = decodeURIComponent(cookie.substring(name.length + 1))
          break
        }
      }
    }
    return cookieValue
  }


  function formatCurrency(value) {
    if (Number.isNaN(value) || value === null) return ""
    return Number(Math.round(value)).toLocaleString("en-US")
  }


  function calculateRemaining() {
    const deposit = parseFloat(depositInput.value || 0)
    const discount = parseFloat(discountInput.value || 0)

    let remaining = rentPrice - deposit - discount
    if (remaining < 0) remaining = 0

    if (remainingAmountField) {
      remainingAmountField.value = formatCurrency(remaining)
    }
  }


  function setStep2Visibility(visible) {
    if (step2Card) step2Card.classList.toggle("d-none", !visible)
    if (step2) step2.style.display = visible ? "block" : "none"
  }


  function setSubmitButtonVisible(visible) {
    if (submitBtn) {
      submitBtn.classList.toggle("d-none", !visible)
      submitBtn.disabled = !visible
    }
  }


  function checkAvailability() {

    const dress = dressSelect.value
    const customer = customerSelect.value
    const start_date = startDateInput.value
    const rental_days = rentalDaysInput.value

    if (!dress || !customer || !start_date || !rental_days) {
      nextBtn.disabled = true
      return
    }

    fetch("/reservations/check-availability/", {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded",
        "X-CSRFToken": getCookie("csrftoken"),
        "X-Requested-With": "XMLHttpRequest"
      },
      body: new URLSearchParams({
        customer_id: customer,
        dress_id: dress,
        start_date: start_date,
        rental_days: rental_days
      })
    })
    .then(response => response.json())
    .then(data => {

      if (!data.success) {
        nextBtn.disabled = true
        alert(data.message || "خطا در بررسی موجودی")
        return
      }

      if (data.available) {

        endDateField.value = data.end_date || ""
        eventDateField.value = data.event_date || ""

        rentPrice = parseFloat(data.rent_price) || 0

        rentPriceField.value = formatCurrency(rentPrice)

        if (remainingAmountField) {
          remainingAmountField.value = formatCurrency(rentPrice)
        }

        nextBtn.disabled = false

      } else {

        nextBtn.disabled = true
        alert(data.message || "این لباس در این بازه زمانی رزرو شده است.")

      }

    })
    .catch(error => {
      console.error("Availability check error:", error)
      nextBtn.disabled = true
    })

  }


  function saveReservationStepOne() {

    const formData = new URLSearchParams({
      customer: customerSelect.value,
      dress: dressSelect.value,
      start_date: startDateInput.value,
      rental_days: rentalDaysInput.value
    })

    return fetch("/reservations/step-one/", {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded",
        "X-CSRFToken": getCookie("csrftoken"),
        "X-Requested-With": "XMLHttpRequest"
      },
      body: formData
    }).then(response => response.json())
  }



  customerSelect.addEventListener("change", checkAvailability)
  dressSelect.addEventListener("change", checkAvailability)
  startDateInput.addEventListener("change", checkAvailability)
  startDateInput.addEventListener("input", checkAvailability)
  rentalDaysInput.addEventListener("input", checkAvailability)

  if (depositInput) depositInput.addEventListener("input", calculateRemaining)
  if (discountInput) discountInput.addEventListener("input", calculateRemaining)


  setStep2Visibility(false)
  setSubmitButtonVisible(false)


  nextBtn.addEventListener("click", function () {

    saveReservationStepOne().then(data => {

      if (data.success) {

        if (step1) step1.style.display = "none"

        setStep2Visibility(true)
        setSubmitButtonVisible(true)

        nextBtn.style.display = "none"

      } else {

        let message = data.message || ""

        if (data.errors) {
          message = Object.values(data.errors).flat().join("\n")
        }

        alert(message || "مرحله اول به درستی ثبت نشد.")

      }

    }).catch(error => {

      console.error("Save step one error:", error)
      alert("خطا در ذخیره اطلاعات مرحله اول.")

    })

  })


  form.addEventListener("submit", function (e) {

    e.preventDefault()

    const formData = new FormData(form)

    fetch("/reservations/create/", {
      method: "POST",
      headers: {
        "X-CSRFToken": getCookie("csrftoken"),
        "X-Requested-With": "XMLHttpRequest"
      },
      body: formData
    })
    .then(res => res.json())
    .then(data => {

      if (data.success) {
        location.reload()
        return
      }

      let message = data.message || ""

      if (data.errors) {
        message = Object.values(data.errors).flat().join("\n")
      }

      alert(message || "خطا در ثبت رزرو")

    })
    .catch(error => {

      console.error("Reservation create error:", error)
      alert("خطا در ثبت رزرو")

    })

  })

})
</script>
