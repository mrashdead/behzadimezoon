<script>
  $(document).ready(function () {
    $(".jalali-datepicker").persianDatepicker({
      format: "YYYY/MM/DD",
      autoClose: true,
      initialValue: false,
      onlySelectOnDate: true,
      observer: true,
      calendar: {
        persian: {
          locale: "fa",
        },
      },
    });
  });
</script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  const inputs = document.querySelectorAll('.jalali-mask');

  inputs.forEach(function (input) {
    input.addEventListener('input', function () {
      let value = this.value.replace(/\D/g, '').slice(0, 8);

      if (value.length > 6) {
        value = value.slice(0, 4) + '/' + value.slice(4, 6) + '/' + value.slice(6);
      } else if (value.length > 4) {
        value = value.slice(0, 4) + '/' + value.slice(4);
      }

      this.value = value;
    });
  });
});
</script>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.js-price').forEach(function (element) {
      const rawPrice = element.dataset.price;
      const number = Number(rawPrice);
      if (!Number.isNaN(number)) {
        element.textContent = number.toLocaleString('en-US');
      } else {
        element.textContent = rawPrice;
      }
    });
  });
</script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.js-jalali-datetime').forEach(function (element) {
      const rawValue = element.dataset.datetime;
      const date = new Date(rawValue);

      if (Number.isNaN(date.getTime())) {
        element.textContent = rawValue;
        return;
      }

      const datePart = new Intl.DateTimeFormat('fa-IR-u-ca-persian', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      }).format(date);

      const timePart = new Intl.DateTimeFormat('fa-IR', {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      }).format(date);

      element.innerHTML = `
        <div class="d-flex flex-column">
          <span class="fw-semibold">${datePart}</span>
          <small class="text-muted">${timePart}</small>
        </div>
      `;
    });
  });
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const step1 = document.getElementById('wizard-step-1');
    const step2 = document.getElementById('wizard-step-2');

    const btnNext = document.getElementById('btnNextStep');
    const btnPrev = document.getElementById('btnPrevStep');
    const btnSubmit = document.getElementById('btnSubmitReservation');

    const stepItems = document.querySelectorAll('.reservation-stepper .step-item');

    const totalAmountInput = document.querySelector('#reservationCreateForm [name="total_amount"]');
    const depositAmountInput = document.querySelector('#reservationCreateForm [name="deposit_amount"]');
    const remainingPreview = document.getElementById('remainingAmountPreview');

    function toFaNumber(number) {
        return new Intl.NumberFormat('fa-IR').format(number);
    }

    function updateStepper(activeStep) {
        stepItems.forEach(item => {
            const step = item.getAttribute('data-step');
            item.classList.toggle('active', step === String(activeStep));
        });
    }

    function showStep(step) {
        if (step === 1) {
            step1.classList.remove('d-none');
            step2.classList.add('d-none');
            btnPrev.classList.add('d-none');
            btnNext.classList.remove('d-none');
            btnSubmit.classList.add('d-none');
        } else {
            step1.classList.add('d-none');
            step2.classList.remove('d-none');
            btnPrev.classList.remove('d-none');
            btnNext.classList.add('d-none');
            btnSubmit.classList.remove('d-none');
        }
        updateStepper(step);
    }

    function updateRemaining() {
        if (!totalAmountInput || !depositAmountInput || !remainingPreview) return;

        const total = parseInt(totalAmountInput.value || 0);
        const deposit = parseInt(depositAmountInput.value || 0);
        const remaining = Math.max(total - deposit, 0);

        remainingPreview.value = `${toFaNumber(remaining)} تومان`;
        remainingPreview.classList.toggle('text-danger', deposit > total);
        remainingPreview.classList.toggle('text-success', deposit <= total);
    }

    function validateStep1() {
        const requiredNames = ['customer', 'dress', 'rent_date', 'ceremony_date', 'return_date', 'rent_days'];
        let firstInvalid = null;

        requiredNames.forEach(name => {
            const input = document.querySelector(`#reservationCreateForm [name="${name}"]`);
            if (!input) return;

            if (!input.value.trim()) {
                input.classList.add('is-invalid');
                if (!firstInvalid) firstInvalid = input;
            } else {
                input.classList.remove('is-invalid');
            }
        });

        if (firstInvalid) {
            firstInvalid.focus();
            return false;
        }

        return true;
    }

    btnNext?.addEventListener('click', function () {
        if (!validateStep1()) return;
        showStep(2);
        updateRemaining();
    });

    btnPrev?.addEventListener('click', function () {
        showStep(1);
    });

    totalAmountInput?.addEventListener('input', updateRemaining);
    depositAmountInput?.addEventListener('input', updateRemaining);

    showStep(1);
    updateRemaining();
});
</script>
