{% extends "base.html" %}

{% block title %}تایید رمز دانلود | بکاپ{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-header">
                    <h5 class="card-title mb-0">ورود رمز امنیتی برای دانلود بکاپ</h5>
                </div>
                <div class="card-body">
                    {% if error_message %}
                        <div class="alert alert-danger">{{ error_message }}</div>
                    {% endif %}
                    <p>برای دانلود فایل بکاپ <strong>{{ backup_name }}</strong>، لطفاً رمز امنیتی را وارد کنید.</p>
                    <form method="post" action="{% url 'dashboard:backup_download' token %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="download_secret" class="form-label">رمز امن</label>
                            <input
                                type="password"
                                id="download_secret"
                                name="download_secret"
                                class="form-control"
                                autocomplete="off"
                                required
                            />
                        </div>
                        <div class="d-flex justify-content-end">
                            <button type="submit" class="btn btn-primary">تایید و دانلود</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
