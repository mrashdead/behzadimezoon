{% load jalali_tags %}

<div class="modal fade" id="createReservationModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-scrollable modal-fullscreen-sm-down">
    <div class="modal-content border-0 shadow">
      <div class="modal-header">
        <h5 class="modal-title">رزرو جدید</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="بستن"></button>
      </div>
      <div class="modal-body" style="max-height: calc(70vh); overflow-y: auto;">
        <form id="reservationStepOneForm" class="row g-3">
          <div class="col-12">
            <div class="card shadow-none border mb-3">
              <div class="card-header bg-body-tertiary">
                <h6 class="mb-0">مرحله اول - اطلاعات رزرو</h6>
              </div>
              <div class="card-body">
                <div class="row g-3">
                  <div class="col-md-6">
                    <div class="row align-items-center mb-3">
                      <label class="col-sm-3 text-sm-end col-form-label">مشتری</label>
                      <div class="col-sm-9">
                        <div class="position-relative combobox-wrapper" data-combobox="customer">
                          <div class="combobox-field">
                            <input
                              type="text"
                              class="form-control combobox-input"
                              placeholder="انتخاب مشتری..."
                              autocomplete="off"
                              data-combobox-input
                            />
                            <button type="button" class="combobox-clear d-none" data-combobox-clear aria-label="پاک کردن انتخاب">
                              ×
                            </button>
                            <span class="combobox-icon" aria-hidden="true">
                              <i class="fi fi-rr-angle-down"></i>
                            </span>
                          </div>
                          <div class="combobox-menu d-none" data-combobox-list role="listbox"></div>
                          <select name="customer" class="d-none" required data-combobox-select>
                            <option value="">انتخاب مشتری</option>
                            {% for customer in customers %}
                            <option value="{{ customer.id }}">{{ customer.bride_first_name }} {{ customer.bride_last_name }} - {{ customer.bride_phone }}</option>
                            {% endfor %}
                          </select>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="col-md-6">
                    <div class="row align-items-center mb-3">
                      <label class="col-sm-3 text-sm-end col-form-label">لباس</label>
                      <div class="col-sm-9">
                        <div class="position-relative combobox-wrapper" data-combobox="dress">
                          <div class="combobox-field">
                            <input
                              type="text"
                              class="form-control combobox-input"
                              placeholder="انتخاب لباس..."
                              autocomplete="off"
                              data-combobox-input
                            />
                            <button type="button" class="combobox-clear d-none" data-combobox-clear aria-label="پاک کردن انتخاب">
                              ×
                            </button>
                            <span class="combobox-icon" aria-hidden="true">
                              <i class="fi fi-rr-angle-down"></i>
                            </span>
                          </div>
                          <div class="combobox-menu d-none" data-combobox-list role="listbox"></div>
                          <select name="dress" class="d-none" required data-combobox-select>
                            <option value="">انتخاب لباس</option>
                            {% for dress in dresses %}
                            <option value="{{ dress.id }}">{{ dress.code }}</option>
                            {% endfor %}
                          </select>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="col-md-6">
                    <div class="row align-items-center mb-3">
                      <label class="col-sm-3 text-sm-end col-form-label">شماره قرارداد</label>
                      <div class="col-sm-9">
                        <input type="text" name="contract_number" id="contractNumberInput" class="form-control" placeholder="CN-10001" autocomplete="off">
                      </div>
                    </div>
                  </div>

                  <div class="col-md-6">
                    <div class="row align-items-center mb-3">
                      <label class="col-sm-3 text-sm-end col-form-label">تاریخ شروع اجاره</label>
                      <div class="col-sm-9">
                        <input type="text" name="start_date" class="form-control jalali-datepicker" required>
                      </div>
                    </div>
                  </div>

                  <div class="col-md-6">
                    <div class="row align-items-center mb-3">
                      <label class="col-sm-3 text-sm-end col-form-label">مدت اجاره (روز)</label>
                      <div class="col-sm-9">
                        <input type="number" name="rental_days" class="form-control" min="1" required>
                      </div>
                    </div>
                  </div>

                  <div class="col-md-6">
                    <div class="row align-items-center mb-3">
                      <label class="col-sm-3 text-sm-end col-form-label">تاریخ مراسم</label>
                      <div class="col-sm-9">
                        <input type="text" id="event_date" class="form-control" readonly>
                      </div>
                    </div>
                  </div>

                  <div class="col-md-6">
                    <div class="row align-items-center mb-3">
                      <label class="col-sm-3 text-sm-end col-form-label">تاریخ پایان</label>
                      <div class="col-sm-9">
                        <input type="text" id="end_date" class="form-control" readonly>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">انصراف</button>
        <button type="button" class="btn btn-primary" id="nextStepButton" disabled>مرحله بعد</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="createReservationStep2Modal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-scrollable modal-fullscreen-sm-down">
    <div class="modal-content border-0 shadow">
      <form id="reservationCreateForm" class="no-ajax" action="{% url 'reservations:create' %}" method="post">
        {% csrf_token %}
        <input type="hidden" name="customer" id="step2CustomerHidden">
        <input type="hidden" name="dress" id="step2DressHidden">
        <input type="hidden" name="start_date" id="step2StartDateHidden">
        <input type="hidden" name="rental_days" id="step2RentalDaysHidden">
        <input type="hidden" name="contract_number" id="step2ContractNumberHidden">
        <div class="modal-header">
          <h5 class="modal-title">مرحله دوم - اطلاعات مالی</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="بستن"></button>
        </div>
        <div class="modal-body" style="max-height: calc(70vh); overflow-y: auto;">
          <div class="row g-3">
            <div class="col-12">
              <div class="card shadow-none border">
                <div class="card-header bg-body-tertiary border-bottom py-3">
                  <h6 class="mb-0 fw-semibold">
                    <i class="fi fi-rr-wallet me-2"></i>
                    پرداخت
                  </h6>
                </div>
                <div class="card-body">
                  <div class="row g-3">
                    <div class="col-md-6">
                      <div class="row align-items-center mb-3">
                        <label class="col-sm-3 text-sm-end col-form-label">روش پرداخت</label>
                        <div class="col-sm-9">
                          <select name="payment_method" class="form-control" required>
                            <option value="">انتخاب کنید</option>
                            <option value="CASH">نقدی</option>
                            <option value="TRANSFER">انتقال بانکی</option>
                            <option value="POS">کارتخوان</option>
                          </select>
                        </div>
                      </div>
                    </div>

                    <div class="col-md-6">
                      <div class="row align-items-center mb-3">
                        <label class="col-sm-3 text-sm-end col-form-label">کد رهگیری پرداخت</label>
                        <div class="col-sm-9">
                          <input type="text" name="payment_tracking_code" class="form-control" required>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-12">
              <div class="card shadow-none border">
                <div class="card-header bg-body-tertiary border-bottom py-3">
                  <h6 class="mb-0 fw-semibold">
                    <i class="fi fi-rr-shield-check me-2"></i>
                    ضمانت‌های اول
                  </h6>
                </div>
                <div class="card-body">
                  <div class="row g-3">
                    <div class="col-md-6">
                      <div class="row align-items-center mb-3">
                        <label class="col-sm-3 text-sm-end col-form-label">نوع ضمانت اول</label>
                        <div class="col-sm-9">
                          <select name="guarantee1_type" class="form-control" required>
                            <option value="CHECK">چک</option>
                            <option value="CASH">پول</option>
                            <option value="GOLD">طلا</option>
                            <option value="PROMISSORY">سفته</option>
                          </select>
                        </div>
                      </div>
                    </div>

                    <div class="col-md-6">
                      <div class="row align-items-center mb-3">
                        <label class="col-sm-3 text-sm-end col-form-label">کد رهگیری ضمانت اول</label>
                        <div class="col-sm-9">
                          <input type="text" name="guarantee1_tracking_code" class="form-control" required>
                        </div>
                      </div>
                    </div>

                    <div class="col-md-6" id="guarantee1PayeeWrapper">
                      <div class="row align-items-center mb-3">
                        <label class="col-sm-3 text-sm-end col-form-label">
                          در وجه ضمانت اول
                          <span class="text-danger" id="guarantee1PayeeRequired" style="display: none;">*</span>
                        </label>
                        <div class="col-sm-9">
                          <input type="text" name="guarantee1_payee" class="form-control" placeholder="نام گیرنده/سازمان" data-guarantee-payee>
                          <small class="form-text text-muted">الزامی است اگر نوع ضمانت اول "چک" باشد</small>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-12">
              <div class="card shadow-none border">
                <div class="card-header bg-body-tertiary border-bottom py-3">
                  <h6 class="mb-0 fw-semibold">
                    <i class="fi fi-rr-shield-check me-2"></i>
                    ضمانت‌های دوم
                  </h6>
                </div>
                <div class="card-body">
                  <div class="row g-3">
                    <div class="col-md-6">
                      <div class="row align-items-center mb-3">
                        <label class="col-sm-3 text-sm-end col-form-label">نوع ضمانت دوم</label>
                        <div class="col-sm-9">
                          <select name="guarantee2_type" class="form-control">
                            <option value="">ندارد</option>
                            <option value="CHECK">چک</option>
                            <option value="CASH">پول</option>
                            <option value="GOLD">طلا</option>
                            <option value="PROMISSORY">سفته</option>
                          </select>
                        </div>
                      </div>
                    </div>

                    <div class="col-md-6">
                      <div class="row align-items-center mb-3">
                        <label class="col-sm-3 text-sm-end col-form-label">کد رهگیری ضمانت دوم</label>
                        <div class="col-sm-9">
                          <input type="text" name="guarantee2_tracking_code" class="form-control">
                        </div>
                      </div>
                    </div>

                    <div class="col-md-6" id="guarantee2PayeeWrapper">
                      <div class="row align-items-center mb-3">
                        <label class="col-sm-3 text-sm-end col-form-label">
                          در وجه ضمانت دوم
                          <span class="text-danger" id="guarantee2PayeeRequired" style="display: none;">*</span>
                        </label>
                        <div class="col-sm-9">
                          <input type="text" name="guarantee2_payee" class="form-control" placeholder="نام گیرنده/سازمان" data-guarantee-payee>
                          <small class="form-text text-muted">الزامی است اگر نوع ضمانت دوم "چک" باشد</small>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-12">
              <div class="card shadow-none border">
                <div class="card-header bg-body-tertiary border-bottom py-3">
                  <h6 class="mb-0 fw-semibold">
                    <i class="fi fi-rr-receipt me-2"></i>
                    بیعانه، تخفیف و محاسبات
                  </h6>
                </div>
                <div class="card-body">
                  <div class="row g-3">
                    <div class="col-md-6">
                      <div class="row align-items-center mb-3">
                        <label class="col-sm-3 text-sm-end col-form-label">بیعانه</label>
                        <div class="col-sm-9">
                          <input type="text" name="deposit_amount" class="form-control money-input" placeholder="0" required>
                        </div>
                      </div>
                    </div>

                    <div class="col-md-6">
                      <div class="row align-items-center mb-3">
                        <label class="col-sm-3 text-sm-end col-form-label">نوع تخفیف</label>
                        <div class="col-sm-9">
                          <select name="discount_type" class="form-control">
                            <option value="NONE">بدون تخفیف</option>
                            <option value="AMOUNT">مبلغ ثابت</option>
                            <option value="PERCENT">درصد</option>
                          </select>
                        </div>
                      </div>
                    </div>

                    <div class="col-md-6">
                      <div class="row align-items-center mb-3">
                        <label class="col-sm-3 text-sm-end col-form-label">مقدار تخفیف</label>
                        <div class="col-sm-9">
                          <input type="text" name="discount_value" class="form-control money-input" value="0" placeholder="0">
                        </div>
                      </div>
                    </div>

                    <div class="col-md-6">
                      <div class="row align-items-center mb-3">
                        <label class="col-sm-3 text-sm-end col-form-label">هزینه اجاره</label>
                        <div class="col-sm-9">
                          <input type="text" id="rent_price" class="form-control money-input" readonly>
                        </div>
                      </div>
                    </div>

                    <div class="col-md-6">
                      <div class="row align-items-center mb-3">
                        <label class="col-sm-3 text-sm-end col-form-label">باقی مانده</label>
                        <div class="col-sm-9">
                          <input type="text" id="remaining_amount" class="form-control money-input" readonly>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">انصراف</button>
          <button type="button" class="btn btn-secondary" id="backToStep1Button">بازگشت</button>
          <button type="submit" class="btn btn-success" id="createReservationButton">ثبت رزرو</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
(function () {
  function setupGuaranteePayeeVisibility() {
    const guarantee1Select = document.querySelector('select[name="guarantee1_type"]');
    const guarantee2Select = document.querySelector('select[name="guarantee2_type"]');

    const guarantee1Input = document.querySelector('input[name="guarantee1_payee"]');
    const guarantee2Input = document.querySelector('input[name="guarantee2_payee"]');

    const guarantee1RequiredIcon = document.querySelector('#guarantee1PayeeRequired');
    const guarantee2RequiredIcon = document.querySelector('#guarantee2PayeeRequired');

    function updateGuaranteeRequirement(select, input, requiredIcon) {
      if (!select || !input) return;

      const isCheck = select.value === 'CHECK';
      input.required = isCheck;

      if (requiredIcon) {
        requiredIcon.style.display = isCheck ? 'inline' : 'none';
      }

      if (!isCheck) {
        input.value = '';
        input.classList.remove('is-invalid');
      }
    }

    // Initial setup
    updateGuaranteeRequirement(guarantee1Select, guarantee1Input, guarantee1RequiredIcon);
    updateGuaranteeRequirement(guarantee2Select, guarantee2Input, guarantee2RequiredIcon);

    // Bind change events
    if (guarantee1Select) {
      guarantee1Select.addEventListener('change', function () {
        updateGuaranteeRequirement(this, guarantee1Input, guarantee1RequiredIcon);
      });
    }

    if (guarantee2Select) {
      guarantee2Select.addEventListener('change', function () {
        updateGuaranteeRequirement(this, guarantee2Input, guarantee2RequiredIcon);
      });
    }
  }

  // Setup when DOM ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupGuaranteePayeeVisibility);
  } else {
    setupGuaranteePayeeVisibility();
  }

  // Re-setup when modal is shown
  document.addEventListener('shown.bs.modal', function (event) {
    if (event.target && event.target.id === 'createReservationStep2Modal') {
      setupGuaranteePayeeVisibility();
    }
  });
})();
</script>
