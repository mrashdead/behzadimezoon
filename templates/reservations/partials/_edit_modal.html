<div class="modal fade" id="editReservationModal{{ reservation.id }}" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-scrollable modal-fullscreen-sm-down">
    <div class="modal-content border-0 shadow">
      <form method="post" action="{% url 'reservations:edit' reservation.pk %}" class="h-100 d-flex flex-column">
        {% csrf_token %}
        <div class="modal-header">
          <h5 class="modal-title">ویرایش اطلاعات رزرو</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="بستن"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-12">
              <div class="card shadow-none border mb-3">
                <div class="card-header bg-body-tertiary">
                  <h6 class="mb-0">اطلاعات لباس و رزرو</h6>
                </div>
                <div class="card-body">
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label class="form-label">لباس</label>
                      <select name="dress" class="form-control" required>
                        <option value="">انتخاب کنید</option>
                        {% load static %}
                        {% for dress in dresses %}
                          <option value="{{ dress.id }}" {% if reservation.dress.id == dress.id %}selected{% endif %}>{{ dress }}</option>
                        {% endfor %}
                      </select>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">تاریخ شروع اجاره</label>
                      <input type="text" name="start_date" class="form-control" value="{{ reservation.start_date }}" required>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">مدت اجاره (روز)</label>
                      <input type="number" name="rental_days" class="form-control" min="1" value="{{ reservation.rental_days }}" required>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-12">
              <div class="card shadow-none border mb-3">
                <div class="card-header bg-body-tertiary">
                  <h6 class="mb-0">اطلاعات مالی</h6>
                </div>
                <div class="card-body">
                  <div class="row g-3">
                    <div class="col-md-6">
                      <div class="mb-3">
                        <label class="form-label">هزینه اجاره</label>
                        <div class="form-control bg-light" style="pointer-events: none;">{{ reservation.rent_price }}</div>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <div class="mb-3">
                        <label class="form-label">بیعانه (ثابت)</label>
                        <div class="form-control bg-light" style="pointer-events: none;">{{ reservation.deposit_amount }}</div>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">تخفیف</label>
                      <input type="number" name="discount_amount" class="form-control" min="0" value="{{ reservation.discount_amount }}">
                    </div>
                    <div class="col-md-6">
                      <div class="mb-3">
                        <label class="form-label">باقی مانده</label>
                        <div class="form-control bg-light" style="pointer-events: none;">{{ reservation.remaining_amount }}</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-12">
              <div class="card shadow-none border">
                <div class="card-header bg-body-tertiary">
                  <h6 class="mb-0">اطلاعات پرداخت و ضمانت</h6>
                </div>
                <div class="card-body">
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label class="form-label">روش پرداخت</label>
                      <select name="payment_method" class="form-control" required>
                        <option value="">انتخاب کنید</option>
                        <option value="CASH" {% if reservation.payment_method == 'CASH' %}selected{% endif %}>نقدی</option>
                        <option value="CARD" {% if reservation.payment_method == 'CARD' %}selected{% endif %}>کارت به کارت</option>
                        <option value="TRANSFER" {% if reservation.payment_method == 'TRANSFER' %}selected{% endif %}>انتقال بانکی</option>
                        <option value="POS" {% if reservation.payment_method == 'POS' %}selected{% endif %}>کارتخوان</option>
                      </select>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">کد رهگیری پرداخت</label>
                      <input type="text" name="payment_tracking_code" class="form-control" value="{{ reservation.payment_tracking_code }}" required>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">نوع ضمانت اول</label>
                      <select name="guarantee1_type" class="form-control" required>
                        <option value="CHECK" {% if reservation.guarantee1_type == 'CHECK' %}selected{% endif %}>چک</option>
                        <option value="CASH" {% if reservation.guarantee1_type == 'CASH' %}selected{% endif %}>پول</option>
                        <option value="GOLD" {% if reservation.guarantee1_type == 'GOLD' %}selected{% endif %}>طلا</option>
                        <option value="PROMISSORY" {% if reservation.guarantee1_type == 'PROMISSORY' %}selected{% endif %}>سفته</option>
                      </select>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">کد رهگیری ضمانت اول</label>
                      <input type="text" name="guarantee1_tracking_code" class="form-control" value="{{ reservation.guarantee1_tracking_code }}" required>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">نوع ضمانت دوم</label>
                      <select name="guarantee2_type" class="form-control">
                        <option value="" {% if not reservation.guarantee2_type %}selected{% endif %}>ندارد</option>
                        <option value="CHECK" {% if reservation.guarantee2_type == 'CHECK' %}selected{% endif %}>چک</option>
                        <option value="CASH" {% if reservation.guarantee2_type == 'CASH' %}selected{% endif %}>پول</option>
                        <option value="GOLD" {% if reservation.guarantee2_type == 'GOLD' %}selected{% endif %}>طلا</option>
                        <option value="PROMISSORY" {% if reservation.guarantee2_type == 'PROMISSORY' %}selected{% endif %}>سفته</option>
                      </select>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">کد رهگیری ضمانت دوم</label>
                      <input type="text" name="guarantee2_tracking_code" class="form-control" value="{{ reservation.guarantee2_tracking_code }}">
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">انصراف</button>
          <button type="submit" class="btn btn-warning">ذخیره تغییرات</button>
        </div>
      </form>
    </div>
  </div>
</div>
