<div class="modal fade" id="deleteReservationModal{{ reservation.id }}" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">حذف رزرو</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="بستن"></button>
      </div>
      <div class="modal-body">
        <p class="mb-2">آیا از حذف این رزرو برای مشتری «{{ reservation.customer }}» و لباس «{{ reservation.dress }}» مطمئن هستید؟</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">انصراف</button>
        <form method="post" action="{% url 'reservations:delete' reservation.pk %}">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">بله، حذف شود</button>
        </form>
      </div>
    </div>
  </div>
</div>
