{% if messages %}
<div class="toast-container position-fixed top-0 start-0 p-3" style="z-index: 1080;">
    {% for message in messages %}
        <div class="toast align-items-center border-0 mb-2 js-auto-toast
            {% if message.tags == 'success' %}text-bg-success
            {% elif message.tags == 'error' %}text-bg-danger
            {% elif message.tags == 'warning' %}text-bg-warning
            {% else %}text-bg-info{% endif %}"
             role="alert"
             aria-live="assertive"
             aria-atomic="true"
             data-bs-delay="3500">
            <div class="d-flex">
                <div class="toast-body">
                    {{ message }}
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="بستن"></button>
            </div>
        </div>
    {% endfor %}
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.js-auto-toast').forEach(function (element) {
            const toast = new bootstrap.Toast(element);
            toast.show();
        });
    });
</script>
{% endif %}
