{# Stat Card Component #}
{# Usage: {% include 'partials/_stat_card.html' with icon='fi-rr-coins' label='کل درآمد' value=totals.total_revenue badge_type='success' badge_text='تومان' %} #}

<div class="col-xxl-3 col-sm-6">
  <div class="card h-100">
    <div class="card-body d-flex gap-3 align-items-center">
      <div class="avatar bg-{{ badge_type }}-subtle rounded-circle text-{{ badge_type }}" style="min-width: 50px; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 24px;">
        <i class="fi {{ icon }}"></i>
      </div>
      <div class="clearfix flex-grow-1">
        <span class="fw-semibold text-muted d-block">{{ label }}</span>
        <h4 class="fw-bold mb-0 mt-1 number-display" data-value="{{ value|default:0 }}">
          {{ value|default:0 }}
        </h4>
        <small class="text-muted">{{ badge_text }}</small>
      </div>
    </div>
  </div>
</div>
