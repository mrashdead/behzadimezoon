{# Stat Card Component #}
{# Usage: {% include 'partials/_stat_card.html' with icon='fi-rr-coins' label='کل درآمد' value=totals.total_revenue badge_type='success' badge_text='تومان' %} #}

<div class="col-xxl-3 col-sm-6 financial-stat-card">
  <div class="card h-100 border-0 shadow-sm">
    <div class="card-body d-flex gap-3 align-items-center">
      <div class="avatar bg-{{ badge_type }}-subtle rounded-circle text-{{ badge_type }}" style="min-width: 48px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 20px;">
        <i class="fi {{ icon }}"></i>
      </div>
      <div class="clearfix flex-grow-1">
        <span class="fw-semibold text-muted d-block small">{{ label }}</span>
        <h2 class="fw-bold mb-0 mt-1 number-display" data-value="{{ value|default:0 }}">{{ value|default:0 }}</h2>
      </div>
    </div>
  </div>
</div>
